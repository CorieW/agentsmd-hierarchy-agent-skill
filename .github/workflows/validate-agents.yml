# AGENTS hierarchy validation workflow for AGENTS and validator changes.

name: Validate AGENTS

on:
  pull_request:
    paths:
      - '**/AGENTS.md'
      - '.codex/skills/agents-hierarchy/**'
      - '.github/workflows/validate-agents.yml'
      - 'package.json'
  push:
    paths:
      - '**/AGENTS.md'
      - '.codex/skills/agents-hierarchy/**'
      - '.github/workflows/validate-agents.yml'
      - 'package.json'
  workflow_dispatch:

jobs:
  validate-agents:
    name: Validate AGENTS Hierarchy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Validate AGENTS files
        run: npm run agents:check -- --strict-placeholders
